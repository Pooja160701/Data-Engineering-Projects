services:
  airflow:
    build: .
    container_name: airflow

    env_file:
      - .env

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data

    command: standalone